name: Build Aseprite (Linux)

on:
  workflow_dispatch:
    inputs:
      aseprite_version:
        description: 'Aseprite Release Tag (e.g., v1.3.17)'
        required: true
        default: 'v1.3.17'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Aseprite
        uses: actions/checkout@v4
        with:
          repository: aseprite/aseprite
          ref: ${{ github.event.inputs.aseprite_version }}
          submodules: 'recursive'

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++ clang cmake ninja-build libx11-dev libxcursor-dev libxi-dev libxrandr-dev libgl1-mesa-dev libfontconfig1-dev

      - name: Download Skia (Linux)
        run: |
          # Using the stable m124-08a5439a6b release
          wget https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-Linux-Release-x64.zip
          unzip Skia-Linux-Release-x64.zip -d skia

      - name: Compile Aseprite
        run: |
          export CC=clang
          export CXX=clang++
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS:STRING=-stdlib=libstdc++ \
            -DCMAKE_EXE_LINKER_FLAGS:STRING=-stdlib=libstdc++ \
            -DLAF_BACKEND=skia \
            -DSKIA_DIR=$GITHUB_WORKSPACE/skia \
            -DSKIA_LIBRARY_DIR=$GITHUB_WORKSPACE/skia/out/Release-x64 \
            -DENABLE_TESTS=OFF
          cd build
          ninja aseprite

      - name: Build .deb Package
        run: |
          VERSION=${{ github.event.inputs.aseprite_version }}
          VERSION_CLEAN=${VERSION#v}
          
          mkdir -p aseprite_deb/opt/aseprite
          mkdir -p aseprite_deb/usr/bin
          mkdir -p aseprite_deb/DEBIAN
          
          cp build/bin/aseprite aseprite_deb/opt/aseprite/
          cp -r build/bin/data aseprite_deb/opt/aseprite/
          
          ln -s /opt/aseprite/aseprite aseprite_deb/usr/bin/aseprite
          
          cat <<EOF > aseprite_deb/DEBIAN/control
          Package: aseprite
          Version: $VERSION_CLEAN
          Section: graphics
          Priority: optional
          Architecture: amd64
          Maintainer: Aseprite Builder
          Description: Animated sprite editor & pixel art tool
          EOF
          
          dpkg-deb --build aseprite_deb aseprite-${VERSION}-linux.deb

      - name: Build Portable Archive (.tar.gz)
        run: |
          VERSION=${{ github.event.inputs.aseprite_version }}
          cd build/bin
          tar -czvf ../../aseprite-${VERSION}-linux-portable.tar.gz ./*
          cd ../../

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Aseprite-${{ github.event.inputs.aseprite_version }}-Linux-Builds
          path: |
            aseprite-*-linux.deb
            aseprite-*-linux-portable.tar.gz
